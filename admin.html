<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Memora Admin</title>

  <link rel="stylesheet" href="admin.css" />
</head>
<body>
    <div id="loginScreen">

  <div class="login-box">

    <h2>Memora Admin Login</h2>

    <input
      type="password"
      id="passwordInput"
      placeholder="Enter Password"
    />

    <button onclick="checkPassword()">
      Login
    </button>

  </div>

</div>

  <div class="container" id="mainDashboard">

    <h1>Memora Moments Admin</h1>

    <!-- Dashboard Cards -->
    <div class="cards">

      <div class="card">
        <h3>Total Orders</h3>
        <p id="totalOrders">0</p>
      </div>

      <div class="card">
        <h3>Total Revenue</h3>
        <p id="totalRevenue">₹0</p>
      </div>

      <div class="card">
        <h3>Total Profit</h3>
        <p id="totalProfit">₹0</p>
      </div>

      <div class="card">
        <h3>Pending Orders</h3>
        <p id="pendingOrders">0</p>
    
      </div>
<div class="card">
  <h3>Delivered</h3>
  <p id="deliveredOrders">0</p>
</div>
    </div>

    <!-- Order Form -->
    <div class="form-section">

      <input type="text" id="customerName" placeholder="Customer Name" />

      <select id="product">
        <option value="4x6">4x6 (Maxi)</option>
        <option value="6x8">6x8</option>
        <option value="6x9">6x9</option>
        <option value="8x12">8x12</option>
        <option value="10x15">10x15</option>
        <option value="12x18">12x18</option>
        <option value="Polaroid">Polaroid</option>
        <option value="Mug">Mug</option>
      </select>

      <input type="number" id="quantity" placeholder="Quantity" />
      <input
  type="number"
  id="discount"
  placeholder="Discount"
/>

      <select id="status">
        <option value="Pending">Pending</option>
        <option value="Delivered">Delivered</option>
      </select>

      <button id="addOrderBtn">
        Add Order
      </button>

    </div>
<button id="exportBtn">
  Export Excel
</button>
    <!-- Orders Table -->
    <table>

      <thead>
        <tr>
          <th>Customer</th>
          <th>Product</th>
          <th>Qty</th>
          <th>Raw Cost</th>
          <th>Selling</th>
          <th>Profit</th>
          <th>Status</th>
          <th>Delete</th>
          <th>Date</th>
        </tr>
      </thead>

      <tbody id="ordersTable">
      </tbody>

    </table>

  </div>
<script src="https://cdn.sheetjs.com/xlsx-0.20.2/package/dist/xlsx.full.min.js"></script>
 <script type="module" src="admin.js"></script>
</body>
</html>
